name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/master/.github/CLA.md'
          branch: 'main'
          allowlist: bot*,dependabot*,github-actions*
          custom-notsigned-prcomment: |
            Thank you for your contribution! 🎉

            Before we can merge this, please sign our **Contributor License Agreement (CLA)**.

            **[Read the CLA](https://github.com/${{ github.repository }}/blob/master/.github/CLA.md)**

            To sign, add a comment on this PR with the exact text:
            ```
            I have read the CLA Document and I hereby sign the CLA
            ```
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'CLA signed ✅ — thank you, all contributors have signed the CLA.'
